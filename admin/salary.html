<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Rekap Gaji — CallPay Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:#0A0A15;color:#F0EBF8;min-height:100vh;padding:20px}
    .header{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.08)}
    .header h1{font-size:1.2rem;font-weight:900}
    .header a{font-size:.82rem;color:rgba(240,235,248,.4);text-decoration:none;font-weight:700}
    .period-info{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:gap}
    .period-label{font-size:.82rem;font-weight:800;color:#FFB800}
    .period-sub{font-size:.72rem;color:rgba(240,235,248,.4);font-weight:600;margin-top:2px}
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
    .summary-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px}
    .summary-label{font-size:.68rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:rgba(240,235,248,.4);margin-bottom:4px}
    .summary-value{font-size:1.1rem;font-weight:900}
    .talent-list{display:flex;flex-direction:column;gap:10px}
    .talent-row{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;transition:border-color .2s}
    .talent-row.paid{border-color:rgba(61,214,140,.3);background:rgba(61,214,140,.03)}
    .talent-row.unpaid{border-color:rgba(255,184,0,.2)}
    .talent-img{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0;background:#1E1E35}
    .talent-info{flex:1;min-width:0}
    .talent-name{font-size:.9rem;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .talent-meta{font-size:.75rem;color:rgba(240,235,248,.5);font-weight:600;margin-top:2px}
    .salary-info{text-align:right;flex-shrink:0}
    .salary-gross{font-size:.75rem;color:rgba(240,235,248,.4);font-weight:700}
    .salary-net{font-size:.95rem;font-weight:900;color:#3DD68C}
    .checkbox-wrap{display:flex;align-items:center;gap:8px;margin-left:8px}
    .salary-checkbox{width:22px;height:22px;accent-color:#3DD68C;cursor:pointer;flex-shrink:0}
    .empty{text-align:center;padding:48px 20px;color:rgba(240,235,248,.35)}
    .loading{text-align:center;padding:40px;color:rgba(240,235,248,.4)}
    @media(max-width:600px){.summary{grid-template-columns:1fr 1fr}.summary-card:last-child{grid-column:span 2}}
  </style>
</head>
<body>

<div class="header">
  <a href="index.html">← Kembali</a>
  <h1>💰 Rekap Gaji Talent</h1>
</div>

<div class="period-info">
  <div>
    <div class="period-label" id="period-label">Memuat periode...</div>
    <div class="period-sub" id="period-sub"></div>
  </div>
  <div style="font-size:.75rem;color:rgba(240,235,248,.4);font-weight:700">Periode: Tgl 5–20 & 21–4</div>
</div>

<div class="summary">
  <div class="summary-card">
    <div class="summary-label">Total Kotor</div>
    <div class="summary-value" id="sum-gross" style="color:#F0EBF8">Rp 0</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Total Bersih</div>
    <div class="summary-value" id="sum-net" style="color:#3DD68C">Rp 0</div>
  </div>
  <div class="summary-card">
    <div class="summary-label">Belum Dibayar</div>
    <div class="summary-value" id="sum-unpaid" style="color:#FFB800">0 talent</div>
  </div>
</div>

<div class="talent-list" id="talent-list">
  <div class="loading">⏳ Memuat data gaji...</div>
</div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
import { getFirestore, collection, query, where, getDocs, onSnapshot,
         doc, setDoc, orderBy, getDoc } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey      : 'AIzaSyBLPe_yx28LyefI856Ysxz3YEPnwA0ENFU',
  authDomain  : 'callpay-28a28.firebaseapp.com',
  projectId   : 'callpay-28a28',
  storageBucket: 'callpay-28a28.firebasestorage.app',
  messagingSenderId: '44722427776',
  appId       : '1:44722427776:web:29d1a297746cd83d685365'
};
const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);

function getCurrentPeriod() {
  const now   = new Date();
  const year  = now.getFullYear();
  const month = now.getMonth();
  const day   = now.getDate();
  const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];

  if (day >= 5 && day <= 20) {
    const start = new Date(year, month, 5);
    const end   = new Date(year, month, 20);
    return {
      id    : `${year}-${String(month+1).padStart(2,'0')}-1`,
      label : `Periode 5–20 ${months[month]} ${year}`,
      start, end
    };
  } else {
    const sm = day > 20 ? month : (month - 1 + 12) % 12;
    const sy = day > 20 ? year : (month === 0 ? year - 1 : year);
    const em = day > 20 ? (month + 1) % 12 : month;
    const ey = day > 20 ? (month === 11 ? year + 1 : year) : year;
    const start = new Date(sy, sm, 21);
    const end   = new Date(ey, em, 4);
    return {
      id    : `${sy}-${String(sm+1).padStart(2,'0')}-2`,
      label : `Periode 21 ${months[sm]}–4 ${months[em]} ${ey}`,
      start, end
    };
  }
}

const period = getCurrentPeriod();
document.getElementById('period-label').textContent = period.label;
document.getElementById('period-sub').textContent   = `${period.start.toLocaleDateString('id-ID')} – ${period.end.toLocaleDateString('id-ID')}`;

async function loadSalaryData() {
  try {
    // Ambil semua talent
    const talentsSnap = await getDocs(collection(db, 'talents'));
    const talents = [];
    talentsSnap.forEach(d => {
      const t = d.data();
      if (t.status === 'approved') talents.push({ id: d.id, ...t });
    });

    // Ambil semua order accepted dalam periode ini
    const ordersSnap = await getDocs(query(
      collection(db, 'orders'),
      where('status', '==', 'accepted')
    ));

    // Hitung gaji per talent
    const salaryMap = {};
    ordersSnap.forEach(d => {
      const order = d.data();
      const createdAt = order.createdAt ? new Date(order.createdAt) : null;
      if (!createdAt || createdAt < period.start || createdAt > period.end) return;
      const tid = order.talentId;
      if (!salaryMap[tid]) salaryMap[tid] = { gross: 0, orders: 0 };
      salaryMap[tid].gross  += Number(order.originalPrice || order.price || 0);
      salaryMap[tid].orders += 1;
    });

    // Ambil status pembayaran dari salary_periods
    const paidMap = {};
    try {
      const salarySnap = await getDocs(query(
        collection(db, 'salary_periods'),
        where('periodId', '==', period.id)
      ));
      salarySnap.forEach(d => {
        const s = d.data();
        paidMap[s.talentId] = { status: s.status, paidAt: s.paidAt, docId: d.id };
      });
    } catch(e) { console.warn('No salary_periods yet'); }

    // Hitung summary
    let totalGross = 0, totalNet = 0, unpaidCount = 0;
    talents.forEach(t => {
      const s = salaryMap[t.id];
      if (!s || s.gross === 0) return;
      totalGross += s.gross;
      totalNet   += Math.round(s.gross * 0.6);
      const paid = paidMap[t.id]?.status === 'paid';
      if (!paid) unpaidCount++;
    });

    document.getElementById('sum-gross').textContent  = 'Rp ' + totalGross.toLocaleString('id-ID');
    document.getElementById('sum-net').textContent    = 'Rp ' + totalNet.toLocaleString('id-ID');
    document.getElementById('sum-unpaid').textContent = unpaidCount + ' talent';

    // Sort: unpaid dulu, paid ke bawah
    const rows = talents
      .filter(t => salaryMap[t.id] && salaryMap[t.id].gross > 0)
      .sort((a, b) => {
        const aPaid = paidMap[a.id]?.status === 'paid' ? 1 : 0;
        const bPaid = paidMap[b.id]?.status === 'paid' ? 1 : 0;
        return aPaid - bPaid;
      });

    if (!rows.length) {
      document.getElementById('talent-list').innerHTML = `
        <div class="empty">
          <div style="font-size:2.5rem;margin-bottom:12px">📭</div>
          <div style="font-weight:800">Belum ada order diterima di periode ini</div>
        </div>`;
      return;
    }

    document.getElementById('talent-list').innerHTML = rows.map(t => {
      const s      = salaryMap[t.id];
      const gross  = s.gross;
      const net    = Math.round(gross * 0.6);
      const paid   = paidMap[t.id]?.status === 'paid';
      const docId  = paidMap[t.id]?.docId || `${t.id}_${period.id}`;
      return `
      <div class="talent-row ${paid ? 'paid' : 'unpaid'}" id="row-${t.id}">
        <img class="talent-img" src="${t.img || ''}" onerror="this.style.display='none'" alt="">
        <div class="talent-info">
          <div class="talent-name">${t.name || t.id}</div>
          <div class="talent-meta">${s.orders} order · ${t.waNumber ? '0'+t.waNumber : '-'}</div>
        </div>
        <div class="salary-info">
          <div class="salary-gross">Kotor: Rp ${gross.toLocaleString('id-ID')}</div>
          <div class="salary-net">Rp ${net.toLocaleString('id-ID')}</div>
        </div>
        <div class="checkbox-wrap">
          <input type="checkbox" class="salary-checkbox" id="cb-${t.id}"
            ${paid ? 'checked' : ''}
            onchange="togglePaid('${t.id}', '${docId}', '${t.name||t.id}', ${gross}, ${net}, this.checked)">
        </div>
      </div>`;
    }).join('');

  } catch(e) {
    console.error('Load salary error:', e);
    document.getElementById('talent-list').innerHTML = `<div class="empty">❌ Gagal memuat data: ${e.message}</div>`;
  }
}

window.togglePaid = async function(talentId, docId, talentName, gross, net, isPaid) {
  try {
    const now = new Date().toISOString();
    await setDoc(doc(db, 'salary_periods', docId), {
      talentId,
      talentName,
      periodId   : period.id,
      periodLabel: period.label,
      totalGross : gross,
      totalNet   : net,
      status     : isPaid ? 'paid' : 'pending',
      paidAt     : isPaid ? now : null,
      createdAt  : now,
    }, { merge: true });

    // Update tampilan row
    const row = document.getElementById(`row-${talentId}`);
    if (row) {
      row.classList.toggle('paid', isPaid);
      row.classList.toggle('unpaid', !isPaid);
    }

    // Pindahkan row: paid ke bawah, unpaid ke atas
    const list = document.getElementById('talent-list');
    if (isPaid) {
      list.appendChild(row);
    } else {
      list.insertBefore(row, list.firstChild);
    }

    // Update summary
    loadSalaryData();

  } catch(e) {
    alert('Gagal update: ' + e.message);
    // Revert checkbox
    document.getElementById(`cb-${talentId}`).checked = !isPaid;
  }
};

loadSalaryData();
</script>
</body>
</html>
