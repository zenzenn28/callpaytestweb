<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hapus Order Talent — CallPay Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css?v=11">
  <style>
    .talent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:16px}
    .talent-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:12px}
    .talent-card:hover{border-color:var(--border-pink);background:rgba(249,168,201,.04);transform:translateY(-2px)}
    .talent-card img{width:44px;height:44px;border-radius:10px;object-fit:cover;flex-shrink:0}
    .talent-card .tc-avatar{width:44px;height:44px;border-radius:10px;background:var(--pink-mid);display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:900;color:#fff;flex-shrink:0}
    .talent-card .tc-name{font-size:.9rem;font-weight:800}
    .talent-card .tc-count{font-size:.72rem;color:var(--muted);font-weight:600;margin-top:2px}
    .search-box{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:600;outline:none}
    .search-box:focus{border-color:rgba(249,168,201,.4)}

    /* Modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
    .modal-bg.open{display:flex}
    .modal-box{background:#16162A;border:1px solid rgba(249,168,201,.2);border-radius:20px;width:100%;max-width:560px;max-height:88vh;display:flex;flex-direction:column}
    .modal-header{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
    .modal-header h3{font-size:1rem;font-weight:900}
    .modal-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:4px}
    .modal-body{overflow-y:auto;padding:16px 22px;flex:1}
    .order-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;transition:opacity .3s}
    .order-item.deleting{opacity:.4;pointer-events:none}
    .order-info{flex:1;min-width:0}
    .order-svc{font-size:.88rem;font-weight:800;color:var(--text)}
    .order-meta{font-size:.72rem;color:var(--muted);font-weight:600;margin-top:2px}
    .order-price{font-size:.82rem;font-weight:800;color:#3DD68C;margin-top:2px}
    .btn-del{padding:8px 12px;border-radius:8px;background:rgba(255,92,92,.1);border:1px solid rgba(255,92,92,.3);color:#FF5C5C;font-family:'Nunito',sans-serif;font-weight:800;font-size:.75rem;cursor:pointer;flex-shrink:0;transition:all .2s;white-space:nowrap}
    .btn-del:hover{background:rgba(255,92,92,.2)}
    .empty-state{text-align:center;padding:32px;color:var(--muted);font-weight:700}
    .loading-state{text-align:center;padding:32px;color:var(--muted);font-weight:700}
  </style>
<script>
function toggleSidebar(){const sb=document.querySelector('.sidebar'),ov=document.getElementById('sidebar-overlay'),btn=document.getElementById('hamburger-btn');if(!sb||!ov||!btn)return;const open=sb.classList.toggle('open');ov.classList.toggle('open',open);btn.textContent=open?'✕':'☰';}
function closeSidebar(){const sb=document.querySelector('.sidebar'),ov=document.getElementById('sidebar-overlay'),btn=document.getElementById('hamburger-btn');if(!sb||!ov||!btn)return;sb.classList.remove('open');ov.classList.remove('open');btn.textContent='☰';}
</script>
</head>
<body>
<div class="app">
  <div class="mobile-topbar"><span class="mobile-logo">CallPay</span><button class="hamburger" onclick="toggleSidebar()" id="hamburger-btn">☰</button></div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-text">CallPay</div><div class="sidebar-logo-sub">Admin Panel</div></div>
    <nav class="sidebar-nav">
      <a href="index.html"            class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
      <a href="order-log.html"        class="nav-item"><span class="nav-icon">📋</span>Log Aktivitas</a>
      <a href="talents.html"          class="nav-item"><span class="nav-icon">⭐</span>Point Talent</a>
      <a href="status.html"           class="nav-item"><span class="nav-icon">🟢</span>Talent Online</a>
      <a href="generate-voucher.html" class="nav-item"><span class="nav-icon">🎟️</span>Generate Voucher</a>
      <a href="hapus-order.html"      class="nav-item active"><span class="nav-icon">🗑️</span>Hapus Order Talent</a>
      <a href="review-testimoni.html" class="nav-item"><span class="nav-icon">💬</span>Review Testimoni</a>
      <a href="../index.html"         class="nav-item" id="back-web"><span class="nav-icon">🌐</span>Lihat Website</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" id="logout-btn">Logout →</button></div>
  </aside>

  <main class="main">
    <div class="page-header">
      <h1>🗑️ Hapus Order Talent</h1>
      <p>Pilih talent untuk melihat dan menghapus order yang diterima.</p>
    </div>

    <input type="text" class="search-box" id="search-input" placeholder="🔍 Cari nama talent..." oninput="filterTalents()">

    <div class="talent-grid" id="talent-grid">
      <div class="loading-state">⏳ Memuat talent...</div>
    </div>
  </main>
</div>

<!-- Modal Order -->
<div class="modal-bg" id="order-modal">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <h3 id="modal-talent-name">Order Talent</h3>
        <div id="modal-talent-meta" style="font-size:.75rem;color:var(--muted);font-weight:600;margin-top:2px"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="loading-state">⏳ Memuat order...</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
import { getFirestore, collection, query, where, onSnapshot,
         getDocs, deleteDoc, doc, orderBy } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';
import { DB } from './data.js?v=11';

const FIREBASE_CONFIG = {
  apiKey           : 'AIzaSyACJjz3XP7vbzxkeZmW_sCXKurAFXZ_vwU',
  authDomain       : 'testweb-9b2f8.firebaseapp.com',
  projectId        : 'testweb-9b2f8',
  storageBucket    : 'testweb-9b2f8.firebasestorage.app',
  messagingSenderId: '223987046525',
  appId            : '1:223987046525:web:9434307a1fe9e9cc147914'
};
const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);

function toast(msg, dur=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

let _allTalents = [];
let _currentTalentId = null;
let _orderUnsubscribe = null;

// Load semua talent
async function loadTalents() {
  const snap = await getDocs(collection(db, 'talents'));
  _allTalents = [];
  snap.forEach(d => {
    const t = d.data();
    if (t.active !== false) _allTalents.push({ id: d.id, ...t });
  });
  _allTalents.sort((a,b) => (a.name||'').localeCompare(b.name||''));
  renderTalents(_allTalents);
}

function renderTalents(list) {
  const grid = document.getElementById('talent-grid');
  if (!list.length) {
    grid.innerHTML = '<div class="loading-state">Tidak ada talent ditemukan.</div>';
    return;
  }
  grid.innerHTML = list.map(t => {
    const initial = (t.name||t.id||'?')[0].toUpperCase();
    const imgEl   = t.img
      ? `<img src="${t.img}" alt="${t.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      : '';
    return `
    <div class="talent-card" onclick="openTalentOrders('${t.id}','${(t.name||t.id).replace(/'/g,"\\'")}')">
      ${imgEl}
      <div class="tc-avatar" style="${t.img?'display:none':''}">
        ${initial}
      </div>
      <div>
        <div class="tc-name">${t.name || t.id}</div>
        <div class="tc-count" id="count-${t.id}">Memuat...</div>
      </div>
    </div>`;
  }).join('');

  // Hitung jumlah order accepted per talent
  list.forEach(t => {
    getDocs(query(collection(db, 'orders'),
      where('talentId', '==', t.id),
      where('status', '==', 'accepted')
    )).then(snap => {
      const el = document.getElementById('count-' + t.id);
      if (el) el.textContent = snap.size + ' order diterima';
    }).catch(() => {
      const el = document.getElementById('count-' + t.id);
      if (el) el.textContent = '';
    });
  });
}

window.filterTalents = function() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if (!q) { renderTalents(_allTalents); return; }
  renderTalents(_allTalents.filter(t => (t.name||t.id||'').toLowerCase().includes(q)));
};

window.openTalentOrders = function(talentId, talentName) {
  _currentTalentId = talentId;
  document.getElementById('modal-talent-name').textContent = talentName;
  document.getElementById('modal-talent-meta').textContent = 'Order yang sudah diterima';
  document.getElementById('modal-body').innerHTML = '<div class="loading-state">⏳ Memuat order...</div>';
  document.getElementById('order-modal').classList.add('open');

  // Unsubscribe listener sebelumnya
  if (_orderUnsubscribe) { _orderUnsubscribe(); _orderUnsubscribe = null; }

  // Realtime listener order accepted talent ini
  const q = query(
    collection(db, 'orders'),
    where('talentId', '==', talentId),
    where('status', '==', 'accepted')
  );

  _orderUnsubscribe = onSnapshot(q, snap => {
    const orders = [];
    snap.forEach(d => orders.push({ _docId: d.id, ...d.data() }));
    orders.sort((a,b) => new Date(b.createdAt||0) - new Date(a.createdAt||0));
    renderOrders(orders, talentName);
    // Update count di card
    const countEl = document.getElementById('count-' + talentId);
    if (countEl) countEl.textContent = orders.length + ' order diterima';
  }, err => {
    document.getElementById('modal-body').innerHTML =
      '<div class="loading-state" style="color:var(--red)">❌ Gagal memuat. Coba lagi.</div>';
  });
};

function renderOrders(orders, talentName) {
  const body = document.getElementById('modal-body');
  if (!orders.length) {
    body.innerHTML = '<div class="empty-state">📭 Tidak ada order yang diterima.</div>';
    return;
  }

  body.innerHTML = orders.map(o => {
    const price   = Number(o.originalPrice || o.price || 0);
    const net     = Math.round(price * 0.6);
    const durFmt  = Number(o.duration) > 90
      ? (Math.floor(Number(o.duration)/60)) + ' jam' + (Number(o.duration)%60 ? ' ' + Number(o.duration)%60 + ' menit' : '')
      : (o.duration||'-') + ' menit';
    const dateStr = o.createdAt ? new Date(o.createdAt).toLocaleDateString('id-ID',{
      day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'
    }) : '-';

    return `
    <div class="order-item" id="oi-${o._docId}">
      <div class="order-info">
        <div class="order-svc">${o.service || '-'} · ${durFmt}</div>
        <div class="order-meta">📱 ${o.custWa || '-'} · 🕐 ${dateStr}</div>
        <div class="order-price">💰 Rp ${price.toLocaleString('id-ID')} · Didapat: Rp ${net.toLocaleString('id-ID')}</div>
      </div>
      <button class="btn-del" onclick="deleteOrder('${o._docId}', ${price})">🗑️ Hapus</button>
    </div>`;
  }).join('');
}

window.deleteOrder = async function(docId, price) {
  if (!confirm('Hapus order ini? Gaji talent akan berkurang Rp ' + Math.round(Number(price)*0.6).toLocaleString('id-ID') + '.')) return;

  const el = document.getElementById('oi-' + docId);
  if (el) el.classList.add('deleting');

  try {
    await deleteDoc(doc(db, 'orders', docId));
    // Catat ke activity log
    try {
      const { addDoc } = await import('https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js');
      await addDoc(collection(db, 'activity_logs'), {
        type       : 'order_deleted',
        description: `Admin menghapus order`,
        detail     : `Order ID: ${docId} · Gaji talent berkurang Rp ${Math.round(Number(price)*0.6).toLocaleString('id-ID')}`,
        createdAt  : new Date().toISOString(),
      });
    } catch(e){}
    toast('✅ Order berhasil dihapus! Gaji talent berkurang secara realtime.');
    // renderOrders akan otomatis update karena onSnapshot
  } catch(e) {
    toast('❌ Gagal hapus: ' + e.message);
    if (el) el.classList.remove('deleting');
  }
};

window.closeModal = function() {
  document.getElementById('order-modal').classList.remove('open');
  if (_orderUnsubscribe) { _orderUnsubscribe(); _orderUnsubscribe = null; }
  _currentTalentId = null;
};

// Tutup modal saat klik backdrop
document.getElementById('order-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('logout-btn').onclick = () => {
  sessionStorage.removeItem('cp_admin_v2');
  window.location.href = 'index.html';
};
document.getElementById('back-web').addEventListener('click', e => {
  e.preventDefault(); window.open('../index.html', '_blank');
});

document.addEventListener('DOMContentLoaded', async () => {
  if (sessionStorage.getItem('cp_admin_v2') !== '1') { window.location.href = 'index.html'; return; }
  document.querySelectorAll('.nav-item').forEach(a => a.addEventListener('click', () => {
    if (window.innerWidth <= 768) closeSidebar();
  }));
  await loadTalents();
});
</script>
</body>
</html>
