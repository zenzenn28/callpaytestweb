<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Generate Voucher — CallPay Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Nunito',sans-serif;background:#0A0A15;color:#F0EBF8;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .header{width:100%;max-width:480px;display:flex;align-items:center;gap:12px;margin-bottom:24px}
    .header h1{font-size:1.1rem;font-weight:900;flex:1}
    .header a{font-size:.82rem;color:rgba(240,235,248,.4);text-decoration:none;font-weight:700}
    .card{width:100%;max-width:480px;background:linear-gradient(145deg,#16162A,#1E1E35);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px}
    .card-title{font-size:1rem;font-weight:900;margin-bottom:6px}
    .card-sub{font-size:.78rem;color:rgba(240,235,248,.4);font-weight:600;margin-bottom:24px;line-height:1.5}
    .form-label{font-size:.72rem;font-weight:800;color:rgba(240,235,248,.5);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;display:block}
    .form-input{width:100%;padding:10px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#F0EBF8;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:600;outline:none;margin-bottom:14px}
    .form-input:focus{border-color:rgba(249,168,201,.4)}
    .form-select{width:100%;padding:10px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#F0EBF8;font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:600;outline:none;margin-bottom:14px;cursor:pointer}
    .form-select option{background:#16162A}
    .preview-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;margin-bottom:14px;display:none}
    .preview-title{font-size:.7rem;font-weight:800;color:rgba(240,235,248,.4);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
    .preview-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.82rem}
    .preview-row:last-child{border-bottom:none}
    .preview-svc{font-weight:700;color:rgba(240,235,248,.7)}
    .preview-dur{font-weight:800;color:#a78bfa}
    .btn-generate{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#E8628A,#F9A8C9);border:none;color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;transition:opacity .2s,transform .2s;box-shadow:0 4px 18px rgba(232,98,138,.3);margin-top:4px}
    .btn-generate:hover{opacity:.9;transform:translateY(-1px)}
    .btn-generate:disabled{opacity:.5;cursor:not-allowed;transform:none}
    .result-box{margin-top:20px;background:rgba(61,214,140,.06);border:1px solid rgba(61,214,140,.25);border-radius:14px;padding:18px;display:none;text-align:center}
    .result-code{font-size:1.8rem;font-weight:900;color:#3DD68C;font-family:monospace;letter-spacing:.12em;margin:10px 0}
    .result-info{font-size:.78rem;color:rgba(240,235,248,.5);font-weight:600;margin-bottom:14px}
    .btn-copy{padding:10px 24px;border-radius:10px;background:rgba(61,214,140,.12);border:1px solid rgba(61,214,140,.3);color:#3DD68C;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#3DD68C;color:#fff;padding:8px 20px;border-radius:99px;font-size:.82rem;font-weight:800;display:none;z-index:9999}
  </style>
</head>
<body>

<div class="header">
  <a href="index.html">← Kembali</a>
  <h1>🎟️ Generate Voucher</h1>
</div>

<div class="card">
  <div class="card-title">Buat Voucher Manual</div>
  <div class="card-sub">Pilih nominal voucher. Customer bisa pakai voucher ini untuk semua layanan sesuai durasi yang tersedia di harga tersebut.</div>

  <label class="form-label">Nominal Voucher *</label>
  <select class="form-select" id="nominal-select" onchange="onNominalChange()">
    <option value="">— Pilih Nominal —</option>
  </select>

  <!-- Preview durasi per layanan -->
  <div class="preview-box" id="preview-box">
    <div class="preview-title">📋 Yang didapat customer</div>
    <div id="preview-list"></div>
  </div>

  <label class="form-label">Nomor WA Penerima (opsional)</label>
  <input type="tel" class="form-input" id="wa-input" placeholder="Contoh: 08123456789" style="font-size:16px">

  <label class="form-label">Catatan (opsional)</label>
  <input type="text" class="form-input" id="note-input" placeholder="Contoh: Refund order #123" style="font-size:16px">

  <button class="btn-generate" id="btn-generate" onclick="generateVoucher()">✨ Generate Voucher</button>

  <div class="result-box" id="result-box">
    <div style="font-size:.78rem;font-weight:800;color:#3DD68C;margin-bottom:4px">✅ Voucher Berhasil Dibuat!</div>
    <div class="result-code" id="result-code">VC-XXXXXXXX</div>
    <div class="result-info" id="result-info"></div>
    <button class="btn-copy" onclick="copyCode()">📋 Salin Kode</button>
  </div>
</div>

<div class="toast" id="toast">✅ Tersalin!</div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
import { getFirestore, collection, doc, setDoc, getDoc, getDocs } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey           : 'AIzaSyACJjz3XP7vbzxkeZmW_sCXKurAFXZ_vwU',
  authDomain       : 'testweb-9b2f8.firebaseapp.com',
  projectId        : 'testweb-9b2f8',
  storageBucket    : 'testweb-9b2f8.firebasestorage.app',
  messagingSenderId: '223987046525',
  appId            : '1:223987046525:web:29d1a297746cd83d685365'
};
const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);

let _prices   = {}; // { NamaLayanan: { 30: 10000, 60: 20000, ... } }
let _services = []; // [ { name, icon, ... } ]
let _nominals = []; // [ 10000, 20000, 30000, ... ] unik, urut

// Build daftar nominal unik dari semua pricelist
function buildNominals() {
  const set = new Set();
  Object.values(_prices).forEach(durMap => {
    Object.values(durMap).forEach(price => { if (price > 0) set.add(Number(price)); });
  });
  _nominals = [...set].sort((a,b) => a - b);

  const sel = document.getElementById('nominal-select');
  sel.innerHTML = '<option value="">— Pilih Nominal —</option>' +
    _nominals.map(n => `<option value="${n}">Rp ${n.toLocaleString('id-ID')}</option>`).join('');
}

// Saat nominal dipilih, tampilkan preview durasi per layanan
function formatDur(menit) {
  const m = Number(menit);
  if (m <= 90) return m + ' menit';
  const jam  = Math.floor(m / 60);
  const sisa = m % 60;
  return sisa > 0 ? jam + ' jam ' + sisa + ' menit' : jam + ' jam';
}

window.onNominalChange = function() {
  const nominal = Number(document.getElementById('nominal-select').value);
  const preview = document.getElementById('preview-box');
  const list    = document.getElementById('preview-list');
  if (!nominal) { preview.style.display = 'none'; return; }

  const rows = [];
  _services.forEach(s => {
    const durMap = _prices[s.name] || {};
    // Cari durasi yang harganya = nominal
    const match = Object.entries(durMap).find(([,p]) => Number(p) === nominal);
    if (match) {
      rows.push(`
        <div class="preview-row">
          <span class="preview-svc">${s.icon || '🎯'} ${s.name}</span>
          <span class="preview-dur">${match[0]} menit</span>
        </div>`);
    }
  });

  if (rows.length) {
    list.innerHTML = rows.join('');
    preview.style.display = 'block';
  } else {
    list.innerHTML = '<div style="font-size:.78rem;color:rgba(240,235,248,.4);font-weight:600">Tidak ada layanan untuk nominal ini.</div>';
    preview.style.display = 'block';
  }
};

function generateCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = 'VC-';
  for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

window.generateVoucher = async function() {
  const nominal = Number(document.getElementById('nominal-select').value);
  const wa      = document.getElementById('wa-input').value.trim().replace(/\D/g, '');
  const note    = document.getElementById('note-input').value.trim();

  if (!nominal) { alert('Pilih nominal voucher dulu!'); return; }

  const btn = document.getElementById('btn-generate');
  btn.disabled = true; btn.textContent = 'Membuat voucher...';

  try {
    const code = generateCode();
    const now  = new Date().toISOString();

    await setDoc(doc(db, 'vouchers', code), {
      code,
      price       : nominal,
      used        : false,
      createdAt   : now,
      reason      : 'admin_generated',
      custWa      : wa || '',
      note        : note || '',
      createdBy   : 'admin',
    });

    const waDisplay = wa ? ' · WA: 0' + wa.replace(/^62/,'').replace(/^0/,'') : '';
    document.getElementById('result-code').textContent = code;
    document.getElementById('result-info').textContent =
      `Rp ${nominal.toLocaleString('id-ID')}${waDisplay}${note ? ' · ' + note : ''}`;
    document.getElementById('result-box').style.display = 'block';

    document.getElementById('wa-input').value   = '';
    document.getElementById('note-input').value = '';

  } catch(e) { alert('Gagal: ' + e.message); }

  btn.disabled = false; btn.textContent = '✨ Generate Voucher';
};

window.copyCode = function() {
  const code = document.getElementById('result-code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const toast = document.getElementById('toast');
    toast.style.display = 'block';
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toast.style.display = 'none', 2000);
  }).catch(() => alert(code));
};

// Init
async function init() {
  const [snapSvc, snapPrice] = await Promise.all([
    getDocs(collection(db, 'services')),
    getDoc(doc(db, 'pricelist', 'admin1'))
  ]);
  _services = [];
  snapSvc.forEach(d => _services.push({ id: d.id, ...d.data() }));
  _services.sort((a,b) => (a.order||99) - (b.order||99));
  if (snapPrice.exists()) _prices = snapPrice.data();
  buildNominals();
}
init();
</script>
</body>
</html>
