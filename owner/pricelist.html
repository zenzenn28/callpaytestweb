<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Kelola Pricelist — CallPay Owner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="owner.css">
  <style>
    .agency-tabs{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
    .agency-tab{padding:9px 22px;border-radius:99px;border:2px solid var(--border-gd);background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;cursor:pointer;transition:all .2s}
    .agency-tab.active{background:linear-gradient(135deg,var(--gold-mid),var(--gold));color:#1A1108;border-color:transparent}
    .agency-tab:hover:not(.active){border-color:var(--gold-mid);color:var(--gold-mid)}

    .service-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:22px 24px;margin-bottom:16px;max-width:660px}
    .service-title{font-size:.95rem;font-weight:900;margin-bottom:16px;display:flex;align-items:center;gap:8px}

    /* Durasi rows */
    .dur-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
    .dur-row{display:grid;grid-template-columns:90px 1fr 32px;gap:8px;align-items:center}
    .dur-input{padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Nunito',sans-serif;font-size:.88rem;font-weight:700;outline:none;transition:border-color .2s;width:100%}
    .dur-input:focus{border-color:var(--gold-mid)}
    .dur-label{font-size:.72rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    .btn-del-dur{width:28px;height:28px;border-radius:8px;background:rgba(255,92,92,.1);border:1px solid rgba(255,92,92,.2);color:var(--red);font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
    .btn-del-dur:hover{background:rgba(255,92,92,.22)}

    .dur-row-header{display:grid;grid-template-columns:90px 1fr 32px;gap:8px;margin-bottom:4px}
    .dur-col-label{font-size:.65rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

    .btn-add-dur{padding:7px 16px;border-radius:99px;background:rgba(255,209,102,.07);border:1px solid var(--border-gd);color:var(--gold-mid);font-family:'Nunito',sans-serif;font-weight:800;font-size:.78rem;cursor:pointer;transition:all .2s;margin-bottom:14px}
    .btn-add-dur:hover{background:rgba(255,209,102,.15)}

    .btn-save-svc{padding:9px 20px;border-radius:99px;background:linear-gradient(135deg,var(--gold-mid),var(--gold));border:none;color:#1A1108;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;transition:opacity .2s}
    .btn-save-svc:hover{opacity:.85}
    .btn-save-svc:disabled{opacity:.4;cursor:not-allowed}
    .save-status{font-size:.75rem;font-weight:700;margin-left:10px;display:inline-block}
    .loading-state{text-align:center;padding:40px;color:var(--muted);font-size:.9rem;font-weight:700}

    @media(max-width:600px){
      .service-section{padding:16px}
      .agency-tabs{gap:8px}
      .agency-tab{padding:8px 16px;font-size:.82rem}
      .dur-row{grid-template-columns:80px 1fr 28px}
    }
  </style>
<script>
function toggleSidebar(){const sb=document.querySelector('.sidebar'),ov=document.getElementById('sidebar-overlay'),btn=document.getElementById('hamburger-btn');if(!sb||!ov||!btn)return;const open=sb.classList.toggle('open');ov.classList.toggle('open',open);btn.textContent=open?'✕':'☰';}
function closeSidebar(){const sb=document.querySelector('.sidebar'),ov=document.getElementById('sidebar-overlay'),btn=document.getElementById('hamburger-btn');if(!sb||!ov||!btn)return;sb.classList.remove('open');ov.classList.remove('open');btn.textContent='☰';}
</script>
<script>
if (sessionStorage.getItem('cp_owner') !== '1') {
  document.addEventListener('DOMContentLoaded', function() { window.location.href = 'index.html'; });
}
</script>
</head>
<body>
<div class="app">
  <div class="mobile-topbar"><span class="mobile-logo">CallPay</span><button class="hamburger" onclick="toggleSidebar()" id="hamburger-btn">☰</button></div>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-text">CallPay</div><div class="sidebar-logo-sub">👑 Owner Panel</div></div>
        <nav class="sidebar-nav">
      <a href="index.html"         class="nav-item"><span class="nav-icon">📊</span>Dashboard</a>
      <a href="ringkasan.html"     class="nav-item"><span class="nav-icon">📈</span>Ringkasan & Omset</a>
      <a href="create-talent.html" class="nav-item"><span class="nav-icon">➕</span>Buat Akun Talent</a>
      <a href="review.html"        class="nav-item"><span class="nav-icon">🔐</span>Kelola Akses Layanan</a>
      <a href="services.html"      class="nav-item"><span class="nav-icon">🎯</span>Kelola Layanan</a>
      <a href="pricelist.html"     class="nav-item"><span class="nav-icon">💲</span active>Kelola Pricelist</a>
      <a href="salary.html"        class="nav-item"><span class="nav-icon">💵</span>Rekap Gaji</a>
      <a href="order-log.html"     class="nav-item"><span class="nav-icon">📋</span>Log Aktivitas</a>
      <a href="settings.html"      class="nav-item"><span class="nav-icon">⚙️</span>Pengaturan</a>
      <a href="../index.html"      class="nav-item" id="back-web"><span class="nav-icon">🌐</span>Lihat Website</a>
    </nav>
    <div class="sidebar-footer"><button class="logout-btn" id="logout-btn">Logout →</button></div>
  </aside>
  <main class="main">
    <div class="page-header">
      <h1>Kelola Pricelist 💰</h1>
      <p>Atur harga layanan per agensi secara realtime</p>
    </div>

    <div class="agency-tabs">
      <button class="agency-tab active" id="tab-admin1" onclick="switchAgency('admin1')">🏢 CallPay</button>
      <button class="agency-tab" id="tab-admin2" onclick="switchAgency('admin2')">🌙 SleepcallPay</button>
      <button class="agency-tab" id="tab-admin3" onclick="switchAgency('admin3')">⚡ ScallpayZ</button>
    </div>

    <div id="pricelist-content">
      <div class="loading-state">⏳ Memuat pricelist...</div>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey:'AIzaSyACJjz3XP7vbzxkeZmW_sCXKurAFXZ_vwU',
  authDomain:'testweb-9b2f8.firebaseapp.com',
  projectId:'testweb-9b2f8',
  storageBucket:'testweb-9b2f8.firebasestorage.app',
  messagingSenderId:'223987046525',
  appId:'1:223987046525:web:29d1a297746cd83d685365'
};
const _app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
const _db  = getFirestore(_app);

// Default pricelist sesuai ketentuan owner
const DEFAULT_PRICES = {
  'Temen Call'   : {30:10000, 60:20000, 90:30000, 120:40000, 150:50000, 180:60000},
  'Sleepcall'    : {30:10000, 60:20000, 90:30000, 120:40000, 150:50000, 180:60000},
  'Temen Curhat' : {20:10000, 40:20000, 60:30000, 80:40000, 100:50000, 120:60000},
  'Pacar Virtual': {15:10000, 30:20000, 45:30000, 60:40000, 75:50000, 90:60000},
  'Video Call'   : {},
};

let _currentAgency = 'admin1';
let _currentPrices = {}; // { 'Temen Call': { 30: 10000, ... }, ... }
let _services      = [];

function toast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show';
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 3000);
}

function durLabel(min) {
  const m = Number(min);
  if (m < 60)  return m + ' menit';
  if (m === 60) return '1 jam';
  if (m % 60 === 0) return (m/60) + ' jam';
  const jam = Math.floor(m/60);
  const sisa = m % 60;
  return jam + ' jam ' + sisa + ' mnt';
}

async function loadServices() {
  try {
    const snap = await getDocs(collection(_db, 'services'));
    _services = [];
    snap.forEach(d => _services.push({ id: d.id, ...d.data() }));
    _services.sort((a,b) => (a.order||99) - (b.order||99));
  } catch(e) { console.warn('Gagal load services:', e); }
}

async function loadPrices(agency) {
  try {
    const snap = await getDoc(doc(_db, 'pricelist', agency));
    const saved = snap.exists() ? snap.data() : {};
    const merged = {};
    _services.forEach(s => {
      if (saved[s.name] && Object.keys(saved[s.name]).length) {
        merged[s.name] = saved[s.name];
      } else if (DEFAULT_PRICES[s.name] && Object.keys(DEFAULT_PRICES[s.name]).length) {
        merged[s.name] = { ...DEFAULT_PRICES[s.name] };
      } else {
        merged[s.name] = {};
      }
    });
    return merged;
  } catch(e) { console.warn('Gagal load prices:', e); return {}; }
}

function renderPricelist(prices) {
  const content = document.getElementById('pricelist-content');
  if (!_services.length) { content.innerHTML = '<div class="loading-state">Belum ada layanan. Tambahkan dulu di Kelola Layanan.</div>'; return; }

  const AGENCY_LABEL = { admin1: 'CallPay', admin2: 'SleepcallPay', admin3: 'ScallpayZ' };
  const otherAgencies = ['admin1','admin2','admin3'].filter(a => a !== _currentAgency);

  content.innerHTML = `
    <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap">
      <button onclick="saveAllServices()" style="padding:10px 20px;border-radius:99px;background:linear-gradient(135deg,var(--gold-mid),var(--gold));border:none;color:#1A1108;font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;cursor:pointer">
        💾 Simpan Semua Layanan
      </button>
      <button onclick="copyToOtherAgencies()" style="padding:10px 20px;border-radius:99px;background:rgba(255,209,102,.08);border:2px solid var(--border-gd);color:var(--gold-mid);font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;cursor:pointer">
        📋 Terapkan ke Semua Agensi
      </button>
    </div>
  ` + _services.map(s => {
    const svc     = s.name;
    const icon    = s.icon || '🎯';
    const svcKey  = svc.replace(/\s+/g, '-');
    const durMap  = prices[svc] || {};
    const durRows = Object.entries(durMap).sort((a,b) => Number(a[0]) - Number(b[0]));
    const isEmpty = durRows.length === 0;

    return `
    <div class="service-section" id="svc-${svcKey}">
      <div class="service-title">${icon} ${svc}</div>
      <div class="dur-row-header">
        <div class="dur-col-label">Durasi (menit)</div>
        <div class="dur-col-label">Harga (Rp)</div>
        <div></div>
      </div>
      <div class="dur-list" id="dur-list-${svcKey}">
        ${isEmpty
          ? `<div style="font-size:.78rem;color:var(--muted);font-weight:600;padding:8px 0">Belum ada durasi. Klik "+ Tambah Durasi" untuk menambah.</div>`
          : durRows.map(([dur, price]) => durRowHTML(svcKey, dur, price)).join('')
        }
      </div>
      <button class="btn-add-dur" onclick="addDurRow('${svcKey}')">+ Tambah Durasi</button>
      <div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px">
        <button class="btn-save-svc" onclick="saveService('${svc}','${svcKey}')">💾 Simpan ${svc}</button>
        <span class="save-status" id="status-${svcKey}"></span>
      </div>
    </div>`;
  }).join('');
}

function durRowHTML(svcKey, dur, price) {
  return `
    <div class="dur-row">
      <input type="number" class="dur-input dur-min" placeholder="menit" value="${dur}" min="1" step="1">
      <input type="number" class="dur-input dur-price" placeholder="harga" value="${price}" min="0" step="1000">
      <button class="btn-del-dur" onclick="this.closest('.dur-row').remove()" title="Hapus">✕</button>
    </div>`;
}

window.addDurRow = function(svcKey) {
  const list = document.getElementById('dur-list-' + svcKey);
  if (!list) return;
  // Hapus placeholder kalau ada
  const ph = list.querySelector('div:not(.dur-row)');
  if (ph) ph.remove();
  const div = document.createElement('div');
  div.innerHTML = durRowHTML(svcKey, '', '');
  list.appendChild(div.firstElementChild);
  list.lastElementChild?.querySelector('.dur-min')?.focus();
};

// Kumpulkan durasi dari DOM untuk 1 layanan
function collectDurs(svcKey) {
  const list = document.getElementById('dur-list-' + svcKey);
  if (!list) return null;
  const rows    = list.querySelectorAll('.dur-row');
  const newDurs = {};
  let valid     = true;
  rows.forEach(row => {
    const min   = parseInt(row.querySelector('.dur-min')?.value);
    const price = parseInt(row.querySelector('.dur-price')?.value);
    if (!isNaN(min) && min > 0 && !isNaN(price) && price >= 0) {
      newDurs[min] = price;
    } else if (row.querySelector('.dur-min')?.value || row.querySelector('.dur-price')?.value) {
      valid = false;
    }
  });
  return valid ? newDurs : null;
}

window.saveService = async function(svc, svcKey) {
  const btn    = document.querySelector(`#svc-${svcKey} .btn-save-svc`);
  const status = document.getElementById('status-' + svcKey);
  btn.disabled = true; btn.textContent = 'Menyimpan...';

  const newDurs = collectDurs(svcKey);
  if (newDurs === null) { toast('❌ Ada baris yang tidak valid'); btn.disabled = false; btn.textContent = `💾 Simpan ${svc}`; return; }
  if (!Object.keys(newDurs).length) { toast('❌ Minimal harus ada 1 durasi'); btn.disabled = false; btn.textContent = `💾 Simpan ${svc}`; return; }

  try {
    _currentPrices[svc] = newDurs;
    await setDoc(doc(_db, 'pricelist', _currentAgency), _currentPrices);
    status.textContent = '✅ Tersimpan!'; status.style.color = 'var(--green)';
    toast(`✅ Harga ${svc} berhasil disimpan!`);
    const list2 = document.getElementById('dur-list-' + svcKey);
    list2.innerHTML = Object.entries(newDurs).sort((a,b)=>Number(a[0])-Number(b[0])).map(([d,p])=>durRowHTML(svcKey,d,p)).join('');
  } catch(e) {
    status.textContent = '❌ Gagal'; status.style.color = 'var(--red)';
    toast('❌ Gagal: ' + e.message);
  }
  setTimeout(() => { status.textContent = ''; }, 3000);
  btn.disabled = false; btn.textContent = `💾 Simpan ${svc}`;
};

// Simpan semua layanan sekaligus
window.saveAllServices = async function() {
  const allPrices = {};
  let valid = true;
  for (const s of _services) {
    const svcKey = s.name.replace(/\s+/g, '-');
    const durs   = collectDurs(svcKey);
    if (durs === null) { toast(`❌ Ada baris tidak valid di ${s.name}`); valid = false; break; }
    allPrices[s.name] = durs;
  }
  if (!valid) return;
  try {
    _currentPrices = allPrices;
    await setDoc(doc(_db, 'pricelist', _currentAgency), _currentPrices);
    toast('✅ Semua layanan berhasil disimpan!');
  } catch(e) { toast('❌ Gagal: ' + e.message); }
};

// Terapkan pricelist saat ini ke semua agensi
window.copyToOtherAgencies = async function() {
  if (!confirm('Terapkan pricelist ini ke SEMUA agensi (admin1, admin2, admin3)? Data agensi lain akan diganti.')) return;
  try {
    const saves = ['admin1','admin2','admin3'].map(a => setDoc(doc(_db, 'pricelist', a), _currentPrices));
    await Promise.all(saves);
    toast('✅ Pricelist diterapkan ke semua agensi!');
  } catch(e) { toast('❌ Gagal: ' + e.message); }
};

window.switchAgency = async function(agency) {
  _currentAgency = agency;
  ['admin1','admin2','admin3'].forEach(a => {
    document.getElementById('tab-'+a).classList.toggle('active', a === agency);
  });
  document.getElementById('pricelist-content').innerHTML = '<div class="loading-state">⏳ Memuat pricelist...</div>';
  _currentPrices = await loadPrices(agency);
  renderPricelist(_currentPrices);
};

document.getElementById('logout-btn').onclick = () => { sessionStorage.removeItem('cp_owner'); window.location.href = 'index.html'; };
document.getElementById('back-web').addEventListener('click', e => { e.preventDefault(); window.open('../index.html','_blank'); });

document.addEventListener('DOMContentLoaded', async () => {
  if (sessionStorage.getItem('cp_owner') !== '1') { window.location.href = 'index.html'; return; }
  document.querySelectorAll('.nav-item').forEach(a => a.addEventListener('click', () => { if(window.innerWidth<=768) closeSidebar(); }));
  await loadServices();
  _currentPrices = await loadPrices('admin1');
  renderPricelist(_currentPrices);
});
</script>
</body>
</html>
