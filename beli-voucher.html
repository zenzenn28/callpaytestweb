<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Beli Voucher — CallPay</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--pink:#F9A8C9;--pink-mid:#E8628A;--gold:#FFD166;--surface:#16162A;--surface2:#1E1E35;--border:rgba(255,255,255,.08);--muted:rgba(240,235,248,.45);--green:#3DD68C;--red:#FF5C5C}
    body{font-family:'Nunito',sans-serif;background:#0A0A15;color:#F0EBF8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .logo{font-family:'Pacifico',cursive;font-size:1.6rem;color:var(--pink-mid);margin-bottom:24px;text-align:center}
    .card{width:100%;max-width:420px;background:linear-gradient(145deg,#16162A,#1E1E35);border:1px solid var(--border);border-radius:20px;padding:28px}
    h2{font-size:1rem;font-weight:900;margin-bottom:6px}
    .sub{font-size:.78rem;color:var(--muted);font-weight:600;margin-bottom:24px;line-height:1.5}
    label{display:block;font-size:.72rem;font-weight:800;color:rgba(240,235,248,.5);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
    input,select{width:100%;padding:11px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#F0EBF8;font-family:'Nunito',sans-serif;font-size:16px;font-weight:600;outline:none;margin-bottom:16px;transition:border-color .2s}
    input:focus,select:focus{border-color:rgba(249,168,201,.4)}
    select option{background:#16162A}
    .btn{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,#E8628A,#F9A8C9);border:none;color:#fff;font-family:'Nunito',sans-serif;font-weight:900;font-size:1rem;cursor:pointer;transition:opacity .2s;box-shadow:0 4px 18px rgba(232,98,138,.3)}
    .btn:hover{opacity:.9}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .info-box{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:.78rem;color:var(--muted);font-weight:600;line-height:1.6}
    .info-box b{color:#F0EBF8}
    .loading{text-align:center;padding:40px;color:var(--muted);font-weight:700}
    .err{text-align:center;padding:40px;color:var(--red);font-weight:700}
  </style>
</head>
<body>

<div class="logo">CallPay</div>

<div class="card" id="main-card">
  <div class="loading">⏳ Memuat...</div>
</div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey           : 'AIzaSyACJjz3XP7vbzxkeZmW_sCXKurAFXZ_vwU',
  authDomain       : 'testweb-9b2f8.firebaseapp.com',
  projectId        : 'testweb-9b2f8',
  storageBucket    : 'testweb-9b2f8.firebasestorage.app',
  messagingSenderId: '223987046525',
  appId            : '1:223987046525:web:9434307a1fe9e9cc147914'
};
const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);

// Ambil adminParam dari URL
const p          = new URLSearchParams(window.location.search);
const adminParam = p.get('admin') || 'admin1';

// Pricelist default — diambil dari Firestore
// nominal = nilai voucher, bayar = yang dibayar customer (sudah termasuk biaya admin Rp 3.000)
const NOMINALS = [
  { nominal: 10000, bayar: 13000 },
  { nominal: 20000, bayar: 23000 },
  { nominal: 30000, bayar: 33000 },
  { nominal: 40000, bayar: 43000 },
  { nominal: 50000, bayar: 53000 },
  { nominal: 60000, bayar: 63000 },
];

async function init() {
  const card = document.getElementById('main-card');
  try {
    // Ambil settings
    const settingsSnap = await getDoc(doc(db, 'settings', adminParam));
    const settings     = settingsSnap.exists() ? settingsSnap.data() : {};

    const pgEnabled = settings.pgEnabled === true;
    const pgSlug    = settings.pgSlug    || 'callpay';
    const waAdmin   = settings.waNumber  || '';
    const agencyName = settings.agencyName || 'CallPay';

    if (!pgEnabled) {
      // PG off → buka WA di tab baru, lalu tampilkan pesan di halaman ini
      const waMsg = encodeURIComponent(`Halo admin ${agencyName}, saya ingin membeli voucher CallPay.`);
      window.open(`https://wa.me/${waAdmin}?text=${waMsg}`, '_blank');
      card.innerHTML = `
        <h2>🎟️ Beli Voucher</h2>
        <div class="info-box" style="display:block;margin-top:12px">
          Pembelian voucher saat ini dilakukan via <b>WhatsApp Admin</b>.<br>
          Chat admin sudah dibuka di tab baru. Silakan konfirmasi pembelian disana.
        </div>
        <button class="btn" style="margin-top:16px" onclick="history.back()">← Kembali</button>
      `;
      return;
    }

    // PG on → tampilkan form
    card.innerHTML = `
      <h2>🎟️ Beli Voucher</h2>
      <p class="sub">Pilih nominal voucher dan masukkan nomor WhatsApp kamu. Setelah pembayaran berhasil, kode voucher akan otomatis dikirim.</p>

      <label>Pilih Nominal</label>
      <select id="nominal-sel">
        <option value="">— Pilih Nominal —</option>
        ${NOMINALS.map(n => `<option value="${n.nominal}" data-bayar="${n.bayar}">Rp ${n.nominal.toLocaleString('id-ID')} (bayar Rp ${n.bayar.toLocaleString('id-ID')})</option>`).join('')}
      </select>

      <label>Nomor WhatsApp Kamu</label>
      <input type="tel" id="wa-input" placeholder="Contoh: 08123456789">

      <div class="info-box" id="info-box" style="display:none"></div>

      <button class="btn" id="btn-bayar" onclick="bayar('${pgSlug}')">💳 Bayar Sekarang</button>
    `;

    document.getElementById('nominal-sel').addEventListener('change', updateInfo);

  } catch(e) {
    card.innerHTML = `<div class="err">❌ Gagal memuat halaman. Coba refresh.</div>`;
    console.error(e);
  }
}

function updateInfo() {
  const sel     = document.getElementById('nominal-sel');
  const nominal = Number(sel.value);
  const bayar   = Number(sel.options[sel.selectedIndex]?.dataset?.bayar || 0);
  const infoBox = document.getElementById('info-box');
  if (!nominal) { infoBox.style.display = 'none'; return; }
  infoBox.style.display = 'block';
  infoBox.innerHTML = `
    Nilai voucher: <b>Rp ${nominal.toLocaleString('id-ID')}</b><br>
    Biaya admin: <b>Rp 3.000</b><br>
    <b style="color:#F0EBF8">Total bayar: Rp ${bayar.toLocaleString('id-ID')}</b>
  `;
}

window.bayar = async function(slug) {
  const sel     = document.getElementById('nominal-sel');
  const nominal = Number(sel.value);
  const bayar   = Number(sel.options[sel.selectedIndex]?.dataset?.bayar || 0);
  const wa      = document.getElementById('wa-input').value.trim().replace(/\D/g,'');
  const btn     = document.getElementById('btn-bayar');

  if (!nominal || !bayar) { alert('Pilih nominal voucher dulu!'); return; }
  if (!wa || wa.length < 9) { alert('Masukkan nomor WhatsApp yang valid!'); return; }

  btn.disabled    = true;
  btn.textContent = '⏳ Memproses...';

  const orderId = 'VC-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5).toUpperCase();

  // Simpan pending payment — nominal = nilai voucher, bayar = total dibayar
  try {
    const res = await fetch('https://callpay-order-15no.vercel.app/api/create-payment', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ orderId, nominal, bayar, custWa: wa, adminParam })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Gagal');
  } catch(e) {
    alert('Gagal membuat transaksi: ' + e.message);
    btn.disabled    = false;
    btn.textContent = '💳 Bayar Sekarang';
    return;
  }

  // Redirect ke Pak Kasir — pakai harga bayar (sudah termasuk biaya admin)
  const redirectUrl = encodeURIComponent(
    `https://zenzenn28.github.io/callpaytestweb/payment-success.html?orderId=${orderId}&wa=${wa}`
  );
  const pakasirUrl = `https://app.pakasir.com/pay/${slug}/${bayar}?order_id=${orderId}&redirect=${redirectUrl}`;
  window.location.href = pakasirUrl;
};

init();
</script>
</body>
</html>
