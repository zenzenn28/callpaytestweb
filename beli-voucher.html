<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Beli Voucher — CallPay</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Pacifico&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--pink:#F9A8C9;--pink-mid:#E8628A;--surface:#16162A;--surface2:#1E1E35;--border:rgba(255,255,255,.08);--muted:rgba(240,235,248,.45)}
    body{font-family:'Nunito',sans-serif;background:#0A0A15;color:#F0EBF8;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
    .logo{font-family:'Pacifico',cursive;font-size:1.8rem;color:var(--pink-mid);margin-bottom:24px;text-align:center}
    .card{width:100%;max-width:440px;background:linear-gradient(145deg,#16162A,#1E1E35);border:1px solid var(--border);border-radius:20px;padding:24px}
    .card-title{display:flex;align-items:center;gap:10px;font-size:1.05rem;font-weight:900;margin-bottom:6px}
    .card-sub{font-size:.78rem;color:var(--muted);font-weight:600;margin-bottom:20px;line-height:1.6}
    label{display:block;font-size:.7rem;font-weight:900;color:rgba(240,235,248,.45);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
    select,input{width:100%;padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#F0EBF8;font-family:'Nunito',sans-serif;font-size:16px;font-weight:600;outline:none;margin-bottom:14px;transition:border-color .2s}
    select:focus,input:focus{border-color:rgba(249,168,201,.4)}
    select option{background:#16162A}
    .info-box{background:rgba(167,139,250,.05);border:1px solid rgba(167,139,250,.2);border-radius:12px;padding:14px;margin-bottom:16px;display:none}
    .info-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.82rem}
    .info-row:last-child{border-bottom:none}
    .info-svc{font-weight:700;color:rgba(240,235,248,.8)}
    .info-dur{font-weight:900;color:#a78bfa}
    .info-total{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.08)}
    .info-total-label{font-size:.75rem;color:var(--muted);font-weight:700}
    .info-total-val{font-size:.92rem;font-weight:900;color:#3DD68C}
    .divider{height:1px;background:rgba(255,255,255,.06);margin:18px 0}
    .btn-method{width:100%;display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:14px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity .2s,transform .2s;margin-bottom:10px;text-align:left}
    .btn-method:hover{opacity:.92;transform:translateY(-1px)}
    .btn-method:disabled{opacity:.4;cursor:not-allowed;transform:none}
    .btn-wa{background:linear-gradient(135deg,#E8628A,#F9A8C9);color:#fff}
    .btn-web{background:linear-gradient(135deg,#5B21B6,#7C3AED);color:#fff}
    .btn-icon{width:42px;height:42px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
    .btn-text{flex:1}
    .btn-text-title{font-size:.95rem;font-weight:900}
    .btn-text-sub{font-size:.72rem;opacity:.8;margin-top:2px;font-weight:600}
    .btn-arrow{font-size:1rem;opacity:.7}
    .loading{text-align:center;padding:40px;color:var(--muted);font-weight:700}
  </style>
</head>
<body>
<div class="logo">CallPay</div>
<div class="card">
  <div class="card-title">🎟️ Beli Voucher</div>
  <p class="card-sub">Pilih nominal voucher dan masukkan nomor WhatsApp kamu. Setelah pembayaran berhasil, kode voucher akan otomatis dikirim.</p>

  <label>Pilih Nominal</label>
  <select id="nominal-sel" onchange="updateInfo()">
    <option value="">— Pilih Nominal —</option>
  </select>

  <div style="margin-top:-10px;margin-bottom:14px;font-size:.72rem;color:rgba(240,235,248,.35);font-weight:600">+ biaya admin Rp 3.000 per transaksi</div>

  <label>Nomor WhatsApp Kamu</label>
  <input type="tel" id="wa-input" placeholder="Contoh: 08123456789" oninput="onWaInput()">
  <div style="margin-top:-10px;margin-bottom:14px;font-size:.72rem;color:rgba(240,235,248,.35);font-weight:600">📱 Talent akan menghubungi nomor ini saat voucher digunakan</div>

  <!-- Info detail layanan -->
  <div class="info-box" id="info-box"></div>

  <div class="divider"></div>

  <!-- Tombol pilihan -->
  <button class="btn-method btn-wa" id="btn-wa" onclick="beliViaWA()" disabled>
    <div class="btn-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="22" height="22" fill="white"><path d="M24 4C13 4 4 13 4 24c0 3.6 1 7 2.7 9.9L4 44l10.4-2.7C17.2 43 20.5 44 24 44c11 0 20-9 20-20S35 4 24 4zm0 36c-3.1 0-6.1-.8-8.7-2.4l-.6-.4-6.2 1.6 1.7-6-.4-.6C8.8 30.1 8 27.1 8 24 8 15.2 15.2 8 24 8s16 7.2 16 16-7.2 16-16 16zm8.7-11.8c-.5-.2-2.8-1.4-3.2-1.5-.4-.2-.7-.2-1 .2-.3.4-1.2 1.5-1.4 1.8-.3.3-.5.4-1 .1-.5-.2-2-.7-3.8-2.3-1.4-1.2-2.3-2.8-2.6-3.2-.3-.5 0-.7.2-1 .2-.2.5-.5.7-.8.2-.3.3-.5.4-.8.1-.3 0-.6-.1-.8-.1-.2-1-2.5-1.4-3.4-.4-.9-.8-.8-1-.8h-.9c-.3 0-.8.1-1.2.6-.4.5-1.6 1.6-1.6 3.8s1.7 4.4 1.9 4.7c.2.3 3.3 5.1 8.1 7.1 1.1.5 2 .8 2.7 1 1.1.3 2.2.3 3 .2.9-.1 2.8-1.1 3.2-2.2.4-1.1.4-2 .3-2.2-.2-.3-.5-.4-1-.6z"/></svg>
    </div>
    <div class="btn-text">
      <div class="btn-text-title">Beli via Admin</div>
      <div class="btn-text-sub">Pembelian melalui admin WhatsApp</div>
    </div>
    <div class="btn-arrow">›</div>
  </button>

  <button class="btn-method btn-web" id="btn-web" onclick="beliViaWeb()" disabled style="display:none">
    <div class="btn-icon">💳</div>
    <div class="btn-text">
      <div class="btn-text-title">Beli via Website</div>
      <div class="btn-text-sub">Bayar otomatis, voucher langsung dikirim</div>
    </div>
    <div class="btn-arrow">›</div>
  </button>
</div>

<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey           : 'AIzaSyACJjz3XP7vbzxkeZmW_sCXKurAFXZ_vwU',
  authDomain       : 'testweb-9b2f8.firebaseapp.com',
  projectId        : 'testweb-9b2f8',
  storageBucket    : 'testweb-9b2f8.firebasestorage.app',
  messagingSenderId: '223987046525',
  appId            : '1:223987046525:web:9434307a1fe9e9cc147914'
};
const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
const db  = getFirestore(app);

const p          = new URLSearchParams(window.location.search);
const adminRaw   = p.get('admin') || 'admin1';
const ADMIN_MAP  = { 'callpay': 'admin1', 'sleepcallpay': 'admin2', 'scallpayz': 'admin3' };
const adminParam = ADMIN_MAP[adminRaw] || adminRaw;

let _prices      = {};
let _pgEnabled   = false;
let _waEnabled   = true;
let _mtClientKey = '';   // Midtrans Client Key — diambil dari Firebase settings
let _waAdmin     = '';

const NOMINALS = [
  { nominal: 10000, bayar: 13000 },
  { nominal: 20000, bayar: 23000 },
  { nominal: 30000, bayar: 33000 },
  { nominal: 40000, bayar: 43000 },
  { nominal: 50000, bayar: 53000 },
  { nominal: 60000, bayar: 63000 },
];

const SVC_ICONS = {
  'Temen Call': '📞', 'Sleepcall': '🌙',
  'Temen Curhat': '🫂', 'Pacar Virtual': '💕', 'Video Call': '📹',
};

// Urutan tampil layanan — layanan baru yang tidak ada di sini otomatis urut di bawah
const SVC_ORDER = ['Temen Call', 'Sleepcall', 'Temen Curhat', 'Pacar Virtual'];

function formatDur(menit) {
  const m = Number(menit);
  if (m <= 90) return m + ' menit';
  const jam = Math.floor(m / 60), sisa = m % 60;
  return sisa > 0 ? `${jam} jam ${sisa} menit` : `${jam} jam`;
}

let _waCheckTimer = null;
window.onWaInput = function() {
  clearTimeout(_waCheckTimer);
  _waCheckTimer = setTimeout(() => {
    const sel = document.getElementById('nominal-sel');
    if (sel.value) updateInfo();
  }, 600);
};

window.updateInfo = async function() {
  const sel     = document.getElementById('nominal-sel');
  const nominal = Number(sel.value);
  const bayar   = Number(sel.options[sel.selectedIndex]?.dataset?.bayar || 0);
  const infoBox = document.getElementById('info-box');
  const btnWa   = document.getElementById('btn-wa');
  const btnWeb  = document.getElementById('btn-web');

  if (!nominal) {
    infoBox.style.display = 'none';
    btnWa.disabled = true; btnWeb.disabled = true;
    return;
  }

  // Cek blacklist global saat WA diisi
  const waRaw = document.getElementById('wa-input').value.trim().replace(/\D/g, '');
  if (waRaw && waRaw.length >= 9) {
    let waClean = waRaw;
    if (waClean.startsWith('0')) waClean = '62' + waClean.slice(1);
    if (!waClean.startsWith('62')) waClean = '62' + waClean;
    try {
      const blRes  = await fetch(`https://callpay-order-15no.vercel.app/api/check-blacklist?custWa=${encodeURIComponent(waClean)}&global=1`);
      const blData = await blRes.json();
      if (blData.blocked) {
        infoBox.style.display = 'block';
        infoBox.innerHTML = `
          <div style="background:rgba(255,92,92,.08);border:1px solid rgba(255,92,92,.25);border-radius:10px;padding:14px;text-align:center">
            <div style="font-size:.9rem;font-weight:900;color:#FF5C5C;margin-bottom:4px">🚫 Nomor kamu tidak dapat melakukan pembelian</div>
            <div style="font-size:.78rem;color:rgba(240,235,248,.5);font-weight:600">Hubungi admin untuk informasi lebih lanjut.</div>
          </div>`;
        btnWa.disabled = true; btnWeb.disabled = true;
        return;
      }
    } catch(e) { /* lanjut */ }
  }

  // Baris layanan sesuai nominal — urut sesuai SVC_ORDER, layanan baru di belakang
  const matched = [];
  Object.entries(_prices).forEach(([svc, durMap]) => {
    if (typeof durMap !== 'object') return;
    const match = Object.entries(durMap).find(([, price]) => Number(price) === nominal);
    if (match) matched.push({ svc, dur: match[0] });
  });

  // Sort: layanan yang ada di SVC_ORDER sesuai urutannya, sisanya di belakang by nama
  matched.sort((a, b) => {
    const ia = SVC_ORDER.indexOf(a.svc);
    const ib = SVC_ORDER.indexOf(b.svc);
    if (ia === -1 && ib === -1) return a.svc.localeCompare(b.svc);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });

  const rows = matched.map(({ svc, dur }) => `
    <div class="info-row">
      <span class="info-svc">${SVC_ICONS[svc]||'🎯'} ${svc}</span>
      <span class="info-dur">${formatDur(dur)}</span>
    </div>`);

  infoBox.style.display = 'block';
  infoBox.innerHTML = `
    <div style="font-size:.7rem;font-weight:900;color:rgba(240,235,248,.4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Yang kamu dapat</div>
    ${rows.join('') || '<div style="font-size:.78rem;color:rgba(240,235,248,.4)">Tidak ada layanan</div>'}
    <div class="info-total">
      <div class="info-total-label">Nilai voucher: Rp ${nominal.toLocaleString('id-ID')} + admin Rp 3.000</div>
      <div class="info-total-val">Total: Rp ${bayar.toLocaleString('id-ID')}</div>
    </div>
  `;

  // Hanya aktifkan tombol yang memang diizinkan (tidak di-off dari panel admin/owner)
  if (_waEnabled)  btnWa.disabled  = false;
  if (_pgEnabled)  btnWeb.disabled = false;
};

window.beliViaWA = function() {
  const wa = document.getElementById('wa-input').value.trim();
  if (!wa) { alert('Masukkan nomor WhatsApp kamu dulu!'); return; }
  const msg = encodeURIComponent(
    `Halo Admin! 👋\nSaya ingin membeli voucher CallPay.\n\n` +
    `💰 Nominal: Rp ${Number(document.getElementById('nominal-sel').value).toLocaleString('id-ID')}\n` +
    `📱 WA saya: ${wa}\n\nMohon info selanjutnya, terima kasih! 🙏`
  );
  window.open(`https://wa.me/${_waAdmin}?text=${msg}`, '_blank');
};

window.beliViaWeb = async function() {
  const sel     = document.getElementById('nominal-sel');
  const nominal = Number(sel.value);
  const bayar   = Number(sel.options[sel.selectedIndex]?.dataset?.bayar || 0);
  const wa      = document.getElementById('wa-input').value.trim().replace(/\D/g, '');
  const btn     = document.getElementById('btn-web');

  if (!nominal || !bayar) { alert('Pilih nominal voucher dulu!'); return; }
  if (!wa || wa.length < 9) { alert('Masukkan nomor WhatsApp yang valid!'); return; }

  // Pastikan Midtrans Snap sudah load
  if (typeof window.snap === 'undefined') {
    alert('Sistem pembayaran sedang dimuat. Tunggu sebentar lalu coba lagi.');
    return;
  }

  btn.disabled = true;
  btn.querySelector('.btn-text-title').textContent = 'Memproses...';

  const orderId = 'VC-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5).toUpperCase();

  try {
    // Minta snap token dari Vercel
    const res  = await fetch('https://callpay-order-15no.vercel.app/api/create-payment', {
      method : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify({ orderId, nominal, bayar, custWa: wa, adminParam }),
    });
    const data = await res.json();
    if (!data.success || !data.snapToken) throw new Error(data.error || 'Gagal membuat transaksi');

    // Buka Midtrans Snap popup
    window.snap.pay(data.snapToken, {
      onSuccess: function(result) {
        window.location.href = `payment-success.html?orderId=${orderId}&wa=${wa}`;
      },
      onPending: function(result) {
        window.location.href = `payment-success.html?orderId=${orderId}&wa=${wa}`;
      },
      onError: function(result) {
        alert('Pembayaran gagal. Silakan coba lagi.');
        btn.disabled = false;
        btn.querySelector('.btn-text-title').textContent = 'Beli via Website';
      },
      onClose: function() {
        btn.disabled = false;
        btn.querySelector('.btn-text-title').textContent = 'Beli via Website';
      },
    });

  } catch(e) {
    alert('Gagal membuat transaksi: ' + e.message);
    btn.disabled = false;
    btn.querySelector('.btn-text-title').textContent = 'Beli via Website';
  }
};

async function init() {
  const card = document.querySelector('.card');
  try {
    const [settingsSnap, priceSnap] = await Promise.all([
      getDoc(doc(db, 'settings', 'config')),
      getDoc(doc(db, 'pricelist', 'admin1')),
    ]);
    const settings = settingsSnap.exists() ? settingsSnap.data() : {};
    if (priceSnap.exists()) _prices = priceSnap.data();

    _pgEnabled   = settings.pgEnabled === true;
    _waEnabled   = settings.waEnabled !== false;
    _mtClientKey = settings.mtClientKey || '';
    _waAdmin     = settings.waNumber  || '62895400709371';

    // Load Midtrans Snap JS kalau pg enabled
    if (_pgEnabled && _mtClientKey) {
      const snapScript = document.createElement('script');
      snapScript.src = 'https://app.midtrans.com/snap/snap.js';
      snapScript.setAttribute('data-client-key', _mtClientKey);
      document.head.appendChild(snapScript);
    }

    // Helper: terapkan style tombol off (pointer-events none = double lock)
    function applyDisabled(btn, subText) {
      btn.disabled = true;
      btn.style.opacity       = '.4';
      btn.style.cursor        = 'not-allowed';
      btn.style.pointerEvents = 'none';
      btn.querySelector('.btn-text-sub').textContent = subText;
    }

    // Populate dropdown nominal
    const sel = document.getElementById('nominal-sel');
    NOMINALS.forEach(n => {
      const opt = document.createElement('option');
      opt.value = n.nominal;
      opt.dataset.bayar = n.bayar;
      opt.textContent = `Rp ${n.nominal.toLocaleString('id-ID')}`;
      sel.appendChild(opt);
    });

    // Tombol Via WA — selalu tampil, disabled kalau off
    const btnWa = document.getElementById('btn-wa');
    if (!_waEnabled) applyDisabled(btnWa, 'Tidak tersedia saat ini');

    // Tombol Via Web — selalu tampil, disabled kalau off
    const btnWeb = document.getElementById('btn-web');
    btnWeb.style.display = 'flex';
    if (!_pgEnabled) applyDisabled(btnWeb, 'Tidak tersedia saat ini');

  } catch(e) {
    console.error(e);
  }
}
init();
</script>
</body>
</html>
